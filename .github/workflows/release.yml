name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore CheckClauses.sln

    - name: Build solution
      run: dotnet build CheckClauses.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test CheckClauses.sln --configuration Release --no-build --verbosity normal

    - name: Create NuGet package
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
          dotnet pack src/CheckClauses/CheckClauses.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=$VERSION
        else
          dotnet pack src/CheckClauses/CheckClauses.csproj --configuration Release --no-build --output ./artifacts
        fi

    - name: Publish to NuGet.org
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
      continue-on-error: true

    - name: Publish to GitHub Packages
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --skip-duplicate
      continue-on-error: true

    - name: Upload release artifacts
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./artifacts/*.nupkg
        asset_name: CheckClauses.nupkg
        asset_content_type: application/zip
      continue-on-error: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-package
        path: ./artifacts/*.nupkg
